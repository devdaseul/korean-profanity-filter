# ============================================================
#  비속어 필터링 파이프라인 전용 설정 파일 (YAML)
#  application.yaml 과 분리한 이유:
#   - 파이프라인 튜닝 값만 별도 관리 → 담당자가 쉽게 수정 가능
#   - application.yaml 에 인프라 설정과 비즈니스 설정이 섞이는 것 방지
#   - 운영 환경별 오버라이드가 필요한 항목만 이 파일에서 관리
#  ※ .properties 대신 .yaml 을 쓰는 이유:
#   - .properties 는 ISO-8859-1 기반으로 한글(UTF-8) 패턴이 깨짐
#   - YAML 은 UTF-8 이 기본이므로 한글 정규식 패턴을 안전하게 저장 가능
# ============================================================

filter:
  pipeline:

    # ──────────────────────────────────────────────────────────
    # [1] 텍스트 정규화 (TextNormalizer)
    # ──────────────────────────────────────────────────────────
    # 반복 문자 최대 허용 횟수 (예: "ㅋㅋㅋㅋ" → "ㅋㅋ" 로 압축)
    normalize:
      max-repeat: 2
      # 시각적 유사 기호/숫자 치환 맵 (Data)
      visual-replacements:
        "7": "ㄱ"
        "L": "ㄴ"
        "1": "ㅣ"
        "0": "ㅇ"
        "8": "ㅂ"
        "r": "ㅏ"
      # 영타 변환 매핑 (Data)
      qwerty:
        eng: "qwertyuiopasdfghjklzxcvbnmQWERTYUIOPASDFGHJKLZXCVBNM"
        kor: "ㅂㅈㄷㄱㅅㅛㅕㅑㅐㅔㅁㄴㅇㄹㅎㅗㅓㅏㅣㅋㅌㅊㅍㅠㅜㅡㅃㅉㄸㄲㅆㅛㅕㅑㅒㅖㅁㄴㅇㄹㅎㅗㅓㅏㅣㅋㅌㅊㅍㅠㅜㅡ"

    # ──────────────────────────────────────────────────────────
    # [2] 정규식 필터 (BadWordFilter - Regex 단계)
    # ──────────────────────────────────────────────────────────
    # 욕설 변형 패턴을 탐지하는 정규식
    # 원본 출처: src/main/resources/data/정규식 필터.txt
    regex:
      pattern: '[시씨씪슈쓔쉬쉽쒸쓉](?:[0-9]*|[0-9]+ *)[바발벌빠빡빨뻘파팔펄]|[섊좆좇졷좄좃좉졽썅춍봊]|[ㅈ조][0-9]*까|ㅅㅣㅂㅏㄹ?|ㅂ[0-9]*ㅅ|[ㅄᄲᇪᄺᄡᄣᄦᇠ]|[ㅅㅆᄴ][0-9]*[ㄲㅅㅆᄴㅂ]|[존좉좇][0-9 ]*나|[자보][0-9]+지|보빨|[봊봋봇봈볻봁봍] *[빨이]|[후훚훐훛훋훗훘훟훝훑][장앙]|[엠앰]창|애[미비]|애자|[가-탏탑-힣]색기|(?:[샊샛세쉐쉑쉨쉒객갞갟갯갰갴겍겎겏겤곅곆곇곗곘곜걕걖걗걧걨걬] *[끼키퀴])|새 *[키퀴]|[병븅][0-9]*[신딱딲]|미친[가-닣닥-힣]|[믿밑]힌|[염옘][0-9]*병|[샊샛샜샠섹섺셋셌셐셱솃솄솈섁섂섓섔섘]기|[섹섺섻쎅쎆쎇쎽쎾쎿섁섂섃썍썎썏][스쓰]|[지야][0-9]*랄|니[애에]미|갈[0-9]*보[^가-힣]|[뻐뻑뻒뻙뻨][0-9]*[뀨큐킹낑]|꼬[0-9]*추|곧[0-9]*휴|[가-힣]슬아치|자[0-9]*박꼼|빨통|[사싸](?:이코|가지|[0-9]*까시)|육[0-9]*시[랄럴]|육[0-9]*실[알얼할헐]|즐[^가-힣]|찌[0-9]*(?:질이|랭이)|찐[0-9]*따|찐[0-9]*찌버거|창[녀놈]|[가-힣]{2,}충[^가-힣]|[가-힣]{2,}츙|부녀자|화냥년|환[양향]년|호[0-9]*[구모]|조[선센][징]|조센|[쪼쪽쪾](?:[발빨]이|[바빠]리)|무현|찌끄[레래]기|(?:하악){2,}|하[앍앜]|느[금급]마|속냐|[tT]l[qQ]kf|Wls|[ㅂ]신|[ㅅ]발|[ㅈ]밥'

    # ──────────────────────────────────────────────────────────
    # [3] Fuzzy 매칭 (BadWordFilter)
    # ──────────────────────────────────────────────────────────
    # NFD 자모 분해 후 N-Gram Jaccard 임계값
    # 값이 낮을수록 관대(오탐↑ 미탐↓), 높을수록 엄격(오탐↓ 미탐↑)
    # 1.0 = 완전 일치만 허용(Fuzzy 사실상 비활성화), 0.7~0.8 권장
    fuzzy:
      threshold: 0.75

    # ──────────────────────────────────────────────────────────
    # [4] RAG 단계 (RagFilterService)
    # ──────────────────────────────────────────────────────────
    # 벡터 유사도 임계값 (0.0~1.0, 높을수록 엄격)
    rag:
      similarity-threshold: 0.82
      top-k: 5
